name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. تنظيف ملفات الأندرويد القديمة لتجنب تعارض الـ Gradle
      - name: Clean old Android files
        run: |
          rm -rf android
          rm -rf build

      # 3. إعداد الجافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. إعداد بيئة فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      # 5. بناء مشروع أندرويد نظيف ومعتمد تلقائياً
      - name: Recreate clean Flutter project structure
        run: |
          mkdir temp_build
          cd temp_build
          flutter create --org com --project-name chatapp .

      # 6. دمج كود الشات وحقن إعدادات الفايربيز وصلاحية الإنترنت
      - name: Merge our chat files into the clean project
        run: |
          # نقل الـ dart code والـ pubspec
          cp -f lib/main.dart temp_build/lib/main.dart
          cp -f pubspec.yaml temp_build/pubspec.yaml
          
          # نقل ملف الفايربيز للمكان المظبوط تلقائياً
          mkdir -p temp_build/android/app/src/main
          cp -f google-services.json temp_build/android/app/google-services.json || cp -f android/app/google-services.json temp_build/android/app/google-services.json || true
          
          # 1. حقن صلاحية الإنترنت في الـ AndroidManifest
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' temp_build/android/app/src/main/AndroidManifest.xml
          
          # 2. حقن إضافة الفايربيز في ملف settings.gradle الرئيسي
          sed -i '/plugins {/a \    id "com.google.gms.google-services" version "4.4.1" apply false' temp_build/android/settings.gradle
          
          # 3. حقن تطبيق الفايربيز في ملف build.gradle الفرعي
          sed -i '/plugins {/a \    id "com.google.gms.google-services"' temp_build/android/app/build.gradle
          
          # 4. تعديل الـ minSdkVersion لـ 21 لضمان تشغيل الفايربيز
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' temp_build/android/app/build.gradle || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' temp_build/android/app/build.gradle || true

      # 7. تحميل المكتبات جوة الفولدر الجديد النظيف بالظبط
      - name: Install dependencies
        run: |
          cd temp_build
          flutter pub get

      # 8. بناء الـ APK النهائي
      - name: Build APK
        run: |
          cd temp_build
          flutter build apk --release --no-tree-shake-icons

      # 9. رفع الـ APK الجديد
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: temp_build/build/app/outputs/flutter-apk/app-release.apk
          
