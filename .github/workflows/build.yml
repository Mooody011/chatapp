name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد الجافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # نسخة مستقرة وممتازة
          cache: true

      # 4. تحميل المكتبات
      - name: Install dependencies
        run: flutter pub get

      # 5. بناء الـ APK بصيغة Release وبدون توقيع للتجربة السريعة
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 6. رفع ملف الـ APK عشان تحمله على موبايلك
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
