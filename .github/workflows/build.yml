name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب كود الشات والملفات اللي عملناها
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد الجافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      # 4. بناء مشروع أندرويد نظيف ومعتمد تلقائياً بالكامل بنفس الـ Package Name
      - name: Recreate clean Flutter project structure
        run: |
          mkdir temp_build
          cd temp_build
          flutter create --org com --project-name chatapp .
          
      # 5. نقل ملفات الكود والشات والفايربيز للمشروع الجديد النظيف
      - name: Merge our chat files into the clean project
        run: |
          # نقل الـ dart code
          cp -f lib/main.dart temp_build/lib/main.dart
          
          # نقل الـ pubspec عشان مكتبات الفايربيز
          cp -f pubspec.yaml temp_build/pubspec.yaml
          
          # نقل ملف الفايربيز السحري للمكان المظبوط تلقائياً
          mkdir -p temp_build/android/app
          cp -f android/app/google-services.json temp_build/android/app/google-services.json
          
          # تفعيل الفايربيز في الـ build.gradle الجديد النظيف
          echo "apply plugin: 'com.google.gms.google-services'" >> temp_build/android/app/build.gradle
          
          # إضافة الـ classpath الخاص بالفايربيز في الـ build.gradle الرئيسي
          sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.4.1"' temp_build/android/build.gradle

      # 6. تحميل المكتبات جوة المشروع الجديد
      - name: Install dependencies
        run: |
          cd temp_build
          flutter pub get

      # 7. بناء الـ APK النهائي النظيف
      - name: Build APK
        run: |
          cd temp_build
          flutter build apk --release --no-tree-shake-icons

      # 8. رفع الـ APK عشان تحمله
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: temp_build/build/app/outputs/flutter-apk/app-release.apk
          
