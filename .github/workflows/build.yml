name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد الجافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      # 4. مسح ملفات الأندرويد القديمة وبناء مشروع نظيف في المجلد الرئيسي فوراً
      - name: Recreate clean Android folder
        run: |
          # مسح الفولدرات القديمة تماماً لتجنب أي تعارض
          rm -rf android
          rm -rf build
          rm -rf .dart_tool
          
          # إنشاء مشروع جديد في المجلد الرئيسي عشان المسارات تكون مظبوطة 100%
          flutter create --org com.example --project-name chatapp .

      # 5. دمج ملف الفايربيز وإضافة إعداده وتصريح الإنترنت
      - name: Configure Firebase and Internet Permission
        run: |
          # التأكد من وجود ملف الفايربيز ونقله للمكان الصحيح
          mkdir -p android/app
          cp -f google-services.json android/app/google-services.json || true
          
          # 1. حقن صلاحية الإنترنت في الـ AndroidManifest
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          
          # 2. حقن إضافة الفايربيز في ملف settings.gradle الرئيسي
          sed -i '/plugins {/a \    id "com.google.gms.google-services" version "4.3.15" apply false' android/settings.gradle
          
          # 3. حقن تطبيق الفايربيز في ملف build.gradle الفرعي
          sed -i '/plugins {/a \    id "com.google.gms.google-services"' android/app/build.gradle
          
          # 4. تعديل الـ minSdkVersion لـ 21 لضمان تشغيل الفايربيز بدون كراش
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle || true

      # 6. تحميل المكتبات
      - name: Install dependencies
        run: flutter pub get

      # 7. بناء الـ APK النهائي
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 8. رفع الـ APK الجديد
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
