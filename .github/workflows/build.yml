name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد الجافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      # 4. بناء مشروع أندرويد نظيف ومعتمد تلقائياً
      - name: Recreate clean Flutter project structure
        run: |
          mkdir temp_build
          cd temp_build
          flutter create --org com --project-name chatapp .

      # 5. دمج كود الشات وحقن إعدادات الفايربيز وصلاحية الإنترنت
      - name: Merge our chat files into the clean project
        run: |
          # نقل الـ dart code والـ pubspec
          cp -f lib/main.dart temp_build/lib/main.dart
          cp -f pubspec.yaml temp_build/pubspec.yaml
          
          # نقل ملف الفايربيز السحري للمكان المظبوط
          mkdir -p temp_build/android/app/src/main
          cp -f android/app/google-services.json temp_build/android/app/google-services.json
          
          # كتابة ملف Manifest كامل ومضمون وفيه صلاحية الإنترنت
          cat <<EOT > temp_build/android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="chatapp" android:name="\${applicationName}" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOT
          
          # حقن إضافات الفايربيز وتعديل الـ SDK
          sed -i '/plugins {/a \    id "com.google.gms.google-services" version "4.4.1" apply false' temp_build/android/settings.gradle
          sed -i '/plugins {/a \    id "com.google.gms.google-services"' temp_build/android/app/build.gradle
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' temp_build/android/app/build.gradle || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' temp_build/android/app/build.gradle || true

      # 6. تحميل المكتبات
      - name: Install dependencies
        run: |
          cd temp_build
          flutter pub get

      # 7. بناء الـ APK النهائي
      - name: Build APK
        run: |
          cd temp_build
          flutter build apk --release --no-tree-shake-icons

      # 8. رفع الـ APK الجديد
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: temp_build/build/app/outputs/flutter-apk/app-release.apk
          
