name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد الجافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      # 4. بناء مشروع أندرويد نظيف ومعتمد تلقائياً
      - name: Recreate clean Flutter project structure
        run: |
          mkdir temp_build
          cd temp_build
          flutter create --org com --project-name chatapp .

      # 5. دمج كود الشات وحقن إعدادات الفايربيز بالطريقة الحديثة والمضمونة
      - name: Merge our chat files into the clean project
        run: |
          # نقل الـ dart code والـ pubspec
          cp -f lib/main.dart temp_build/lib/main.dart
          cp -f pubspec.yaml temp_build/pubspec.yaml
          
          # نقل ملف الفايربيز السحري للمكان المظبوط تلقائياً
          mkdir -p temp_build/android/app
          cp -f android/app/google-services.json temp_build/android/app/google-services.json
          
          # 1. حقن إضافة الفايربيز في ملف settings.gradle الرئيسي
          sed -i '/plugins {/a \    id "com.google.gms.google-services" version "4.4.1" apply false' temp_build/android/settings.gradle
          
          # 2. حقن تطبيق الفايربيز في ملف build.gradle الفرعي (داخل block الـ plugins)
          sed -i '/plugins {/a \    id "com.google.gms.google-services"' temp_build/android/app/build.gradle
          
          # 3. رفع الـ minSdkVersion لـ 21 (شرط أساسي لتشغيل الفايربيز)
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' temp_build/android/app/build.gradle || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' temp_build/android/app/build.gradle || true

      # 6. تحميل المكتبات جوة المشروع الجديد
      - name: Install dependencies
        run: |
          cd temp_build
          flutter pub get

      # 7. بناء الـ APK النهائي النظيف
      - name: Build APK
        run: |
          cd temp_build
          flutter build apk --release --no-tree-shake-icons

      # 8. رفع الـ APK عشان تحمله
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: temp_build/build/app/outputs/flutter-apk/app-release.apk
          
