name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد الجافا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      # 4. بناء هيكل المشروع بالكامل برمجياً
      - name: Recreate clean Flutter project structure
        run: |
          mkdir temp_build
          cd temp_build
          flutter create --org com.example --project-name chatapp .
          
          # مسح ملفات الـ gradle الافتراضية عشان نكتب النسخ المتوافقة مع الفايربيز
          rm -f android/build.gradle
          rm -f android/app/build.gradle
          rm -f android/settings.gradle

      # 5. كتابة ملفات الـ Gradle المتوافقة مع الفايربيز مع سطر الربط التلقائي للـ Plugins
      - name: Write clean compatible Gradle files
        run: |
          # 1. كتابة settings.gradle الرئيسي (مع سطر ربط الـ Plugins السحري)
          cat <<'EOF' > temp_build/android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  def propertiesFile = new File(settingsDir, "local.properties")
                  if (propertiesFile.exists()) {
                      propertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
                  }
                  def sdkPath = properties.getProperty("flutter.sdk")
                  if (sdkPath == null) {
                      sdkPath = System.getenv("FLUTTER_ROOT")
                  }
                  if (sdkPath == null) {
                      throw new GradleException("Flutter SDK not found.")
                  }
                  return sdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "7.3.0" apply false
              id "org.jetbrains.kotlin.android" version "1.7.10" apply false
              id "com.google.gms.google-services" version "4.3.15" apply false
          }

          include ":app"

          // السطر السحري لربط جميع الـ Plugins تلقائياً بمشروع الأندرويد
          apply from: "${settingsDir}/../.flutter-plugins-dependencies"
          EOF

          # 2. كتابة build.gradle الرئيسي (Project-level)
          cat <<'EOF' > temp_build/android/build.gradle
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # 3. كتابة build.gradle الفرعي (App-level)
          cat <<'EOF' > temp_build/android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
              id "com.google.gms.google-services"
          }

          android {
              namespace "com.example.chatapp"
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.chatapp"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          EOF

      # 6. دمج كود الشات وصلاحية الإنترنت وملف الفايربيز
      - name: Merge our chat files into the clean project
        run: |
          # نقل الكود والـ pubspec
          cp -f lib/main.dart temp_build/lib/main.dart
          cp -f pubspec.yaml temp_build/pubspec.yaml
          
          # نقل ملف الفايربيز للمكان المظبوط
          mkdir -p temp_build/android/app/src/main
          cp -f google-services.json temp_build/android/app/google-services.json || cp -f android/app/google-services.json temp_build/android/app/google-services.json || true
          
          # كتابة الـ AndroidManifest بكامل التصاريح وصلاحية الإنترنت
          cat <<'EOF' > temp_build/android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.chatapp">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:label="chatapp"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      # 7. تحميل المكتبات
      - name: Install dependencies
        run: |
          cd temp_build
          flutter pub get

      # 8. بناء الـ APK النهائي
      - name: Build APK
        run: |
          cd temp_build
          flutter build apk --release --no-tree-shake-icons

      # 9. رفع الـ APK الجديد
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: temp_build/build/app/outputs/flutter-apk/app-release.apk
          
